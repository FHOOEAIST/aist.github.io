---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p>{% if site.active_lang == 'en' %}{{ page.date | date: "%B %d, %Y" }}{% else %}{{ page.date | date: "%d.%m.%Y" }}{% endif %}</p>
    {% if page.title_image %}
    <img src="{{ page.title_image }}" alt="{{ page.title }}">
    {% endif %}
  </header>

  <div>
    {{ content }}
  </div>
</article>
