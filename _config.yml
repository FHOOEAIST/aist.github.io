title: AIST Research Group
description: >-
  AIST – Advanced Information Systems and Technology. Research group at the University of Applied Sciences Upper Austria, Campus Hagenberg. Focused on eHealth, Machine Learning, and Computer Vision.
baseurl: "/aist.github.io"
url: "https://github.aist.science"
author: "AIST Research Group – FH Upper Austria"
twitter_handle: "@FHOOEAIST"
og_image: "/assets/images/footer/aist-logo.png"
theme_color: "#ffffff"

permalink: /:year/:month/:day/:title:output_ext

languages: ["de", "en"]
default_lang: "de"
exclude_from_localization: ["javascript", "images", "css", "assets", "pagefind"]
parallel_localization: false
lang_from_path: true

sass:
  sourcemap: never

pagination:
  enabled: true
  per_page: 10
  permalink: "/page/:num/"
  title: ":title - Seite :num"
  sort_field: "date"
  sort_reverse: true
  trail:
    before: 2
    after: 2

collections:
  projects:
    output: true
    permalink: /projects/:title/
  publications:
    output: false
  theses:
    output: false

plugins:
  - jekyll-feed
  - jekyll-polyglot
  - jekyll-paginate-v2

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      css: "projects"
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"
  - scope:
      path: ""
      type: "theses"
    values:
      layout: "thesis"
